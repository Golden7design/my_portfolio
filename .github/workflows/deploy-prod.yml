name: Deploy Production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  SEQPULSE_BASE_URL: ${{ secrets.SEQPULSE_BASE_URL }}
  SEQPULSE_API_KEY: ${{ secrets.SEQPULSE_API_KEY }}
  SEQPULSE_METRICS_ENDPOINT: ${{ secrets.SEQPULSE_METRICS_ENDPOINT }}
  SEQPULSE_HTTP_CONNECT_TIMEOUT_SECONDS: "1"
  SEQPULSE_HTTP_MAX_TIME_SECONDS: "4"

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Trigger SeqPulse (pre-deploy, non-blocking)
        run: bash .github/scripts/seqpulse-trigger.sh

      - name: Build Project Artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --prod

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Finish SeqPulse (post-deploy, non-blocking)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: bash .github/scripts/seqpulse-finish.sh
