name: Deploy Production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  SEQPULSE_BASE_URL: ${{ secrets.SEQPULSE_BASE_URL }}
  SEQPULSE_API_KEY: ${{ secrets.SEQPULSE_API_KEY }}
  SEQPULSE_METRICS_ENDPOINT: ${{ secrets.SEQPULSE_METRICS_ENDPOINT }}

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (advisory)
        continue-on-error: true
        run: npm run -s lint

      - run: npm run -s build
      - run: npm install -g vercel
      - run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --prod

      - name: SeqPulse trigger (SDK CLI)
        id: seqpulse_trigger
        run: |
          npx -y seqpulse@0.5.2 ci trigger \
            --env prod \
            --branch "$GITHUB_REF_NAME" \
            --github-output "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        id: vercel_deploy
        run: |
          set -euo pipefail
          URL="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          URL="${URL//$'\n'/}"
          echo "VERCEL_DEPLOYMENT_URL=$URL" >> "$GITHUB_ENV"
          echo "deployment_url=$URL" >> "$GITHUB_OUTPUT"

      - name: SeqPulse finish (SDK CLI)
        if: always()
        run: |
          npx -y seqpulse@0.5.2 ci finish \
            --deployment-id "${{ steps.seqpulse_trigger.outputs.deployment_id }}" \
            --job-status "${{ job.status }}"